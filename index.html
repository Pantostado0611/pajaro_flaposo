<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MINIJUEGOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan:   #00f0ff;
      --pink:   #ff2d78;
      --yellow: #ffe600;
      --dark:   #0a0a12;
      --card:   #12121e;
      --border: #2a2a44;
    }

    body {
      background: var(--dark);
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── STARFIELD ── */
    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── SCANLINES overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,.18) 3px,
        rgba(0,0,0,.18) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
      gap: 48px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-size: clamp(22px, 5vw, 40px);
      letter-spacing: 6px;
      color: var(--cyan);
      text-shadow:
        0 0 8px var(--cyan),
        0 0 24px var(--cyan),
        4px 4px 0 #003040;
      animation: flicker 6s infinite;
    }

    .tagline {
      font-size: clamp(7px, 1.6vw, 10px);
      color: #555;
      letter-spacing: 3px;
    }

    .divider {
      width: min(480px, 90vw);
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--pink), var(--cyan), transparent);
      border-radius: 2px;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 320px));
      gap: 28px;
      justify-content: center;
      width: 100%;
      max-width: 900px;
    }

    /* ── CARD ── */
    .card {
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 3px solid var(--border);
      image-rendering: pixelated;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: border-color .15s, transform .15s;
      /* pixel shadow */
      box-shadow:
        4px 4px 0 #000,
        8px 8px 0 #000;
    }

    .card:hover {
      border-color: var(--cyan);
      transform: translate(-3px, -3px);
      box-shadow:
        7px 7px 0 #000,
        11px 11px 0 rgba(0,240,255,.15);
    }

    .card:active {
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 #000;
    }

    /* corner pixels */
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--dark);
    }
    .card::before { top: -3px; right: -3px; border-bottom-left-radius: 0; }
    .card::after  { bottom: -3px; left: -3px; }

    .card-preview {
      width: 100%;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      background: #0d0d1a;
      border-bottom: 3px solid var(--border);
      overflow: hidden;
      position: relative;
    }

    .card:hover .card-preview {
      border-color: var(--cyan);
    }

    /* animated pixel bg inside card */
    .card-preview canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      opacity: .35;
    }

    .card-emoji {
      font-size: 56px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 12px rgba(255,255,255,.4));
      animation: bob 2.4s ease-in-out infinite;
    }

    .card-body {
      padding: 20px 18px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-title {
      font-size: clamp(10px, 2.2vw, 13px);
      color: var(--yellow);
      text-shadow: 2px 2px 0 #443300;
      letter-spacing: 1px;
    }

    .card-desc {
      font-size: clamp(6px, 1.3vw, 8px);
      color: #777;
      line-height: 1.9;
    }

    .card-tag {
      display: inline-block;
      font-size: 6px;
      padding: 4px 8px;
      border: 2px solid;
      letter-spacing: 1px;
      margin-right: 6px;
    }

    .tag-action  { color: var(--pink);   border-color: var(--pink); }
    .tag-plat    { color: var(--cyan);   border-color: var(--cyan); }
    .tag-arcade  { color: var(--yellow); border-color: var(--yellow); }

    .card-play {
      margin-top: 4px;
      font-family: inherit;
      font-size: 8px;
      padding: 10px 0;
      width: 100%;
      background: transparent;
      border: 2px solid var(--border);
      color: #444;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all .15s;
    }

    .card:hover .card-play {
      border-color: var(--cyan);
      color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan);
    }

    /* ── FOOTER ── */
    footer {
      font-size: 7px;
      color: #333;
      letter-spacing: 2px;
      text-align: center;
    }

    /* ── ANIMATIONS ── */
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    @keyframes flicker {
      0%,100%   { opacity: 1; }
      93%        { opacity: 1; }
      94%        { opacity: .6; }
      95%        { opacity: 1; }
      97%        { opacity: .7; }
      98%        { opacity: 1; }
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="page">
  <header>
    <div class="logo">MINIJUEGOS</div>
    <div class="tagline">INSERT COIN TO CONTINUE</div>
    <div class="divider"></div>
  </header>

  <div class="grid">

    <!-- Pajaro Flaposo -->
    <a class="card" href="pajaro-flaposo.html">
      <div class="card-preview">
        <canvas class="card-bg" data-colors="#001a00,#003300,#00ff44"></canvas>
        <span class="card-emoji">🐦</span>
      </div>
      <div class="card-body">
        <div class="card-title">PAJARO FLAPOSO</div>
        <div class="card-desc">Vuela entre los tubos sin chocar. Cada tap cuenta.</div>
        <div>
          <span class="card-tag tag-arcade">ARCADE</span>
          <span class="card-tag tag-action">1 JUGADOR</span>
        </div>
        <button class="card-play">▶ JUGAR</button>
      </div>
    </a>

    <!-- Mapachón -->
    <a class="card" href="mapachon.html">
      <div class="card-preview">
        <canvas class="card-bg" data-colors="#050810,#0a1020,#4060b0"></canvas>
        <span class="card-emoji">🦝</span>
      </div>
      <div class="card-body">
        <div class="card-title">MAPACHÓN</div>
        <div class="card-desc">Explora las ruinas como un mapache aventurero.</div>
        <div>
          <span class="card-tag tag-plat">PLATAFORMAS</span>
          <span class="card-tag tag-action">1 JUGADOR</span>
        </div>
        <button class="card-play">▶ JUGAR</button>
      </div>
    </a>

  </div>

  <footer>© 2026 &nbsp;·&nbsp; HECHO CON ❤️ Y PÍXELES</footer>
</div>

<script>
// ── STARFIELD ────────────────────────────────────────────────────────────────
(function () {
  const cvs = document.getElementById('stars');
  const ctx = cvs.getContext('2d');
  let W, H, stars;

  function init() {
    W = cvs.width  = window.innerWidth;
    H = cvs.height = window.innerHeight;
    stars = Array.from({ length: 120 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      s: Math.random() * 1.5 + .5,
      a: Math.random(),
      sp: Math.random() * .008 + .003,
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const st of stars) {
      st.a += st.sp;
      if (st.a > 1) st.a = 0;
      const alpha = Math.abs(Math.sin(st.a * Math.PI));
      ctx.fillStyle = `rgba(200,220,255,${alpha * .8})`;
      ctx.fillRect(Math.round(st.x), Math.round(st.y), Math.ceil(st.s), Math.ceil(st.s));
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  init();
  draw();
})();

// ── CARD PIXEL BG ─────────────────────────────────────────────────────────────
document.querySelectorAll('.card-bg').forEach(cvs => {
  const colors = cvs.dataset.colors.split(',');
  const ctx = cvs.getContext('2d');
  const PX = 8;
  let cols, rows, grid, t = 0;

  function init() {
    cvs.width  = cvs.offsetWidth  || 320;
    cvs.height = cvs.offsetHeight || 180;
    cols = Math.ceil(cvs.width  / PX);
    rows = Math.ceil(cvs.height / PX);
    grid = Array.from({ length: rows }, () =>
      Array.from({ length: cols }, () => Math.random() < .06 ? 2 : Math.random() < .2 ? 1 : 0)
    );
  }

  function draw() {
    t++;
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const v = grid[r][c];
        if (v === 0) continue;
        const flicker = v === 2 && Math.sin(t * .07 + c + r) > .6;
        ctx.fillStyle = flicker ? '#ffffff' : colors[v] || colors[1];
        ctx.globalAlpha = v === 2 ? .9 : .6;
        ctx.fillRect(c * PX, r * PX, PX, PX);
      }
    }
    ctx.globalAlpha = 1;
  }

  new ResizeObserver(init).observe(cvs.parentElement);
  init();
  setInterval(draw, 80);
});
</script>
</body>
</html>
